apiVersion: apps/v1
kind: Deployment
metadata:
  name: voiceagent-api
  labels:
    app: voiceagent-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voiceagent-api
  template:
    metadata:
      labels:
        app: voiceagent-api
    spec:
      containers:
        - name: api
          image: ghcr.io/voiceagent/voiceagent:latest
          ports:
            - containerPort: 8000
          command: ["uvicorn", "voiceagent_api.app:app", "--app-dir", "apps/api/src", "--host", "0.0.0.0", "--port", "8000"]
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: voiceagent-config
            - secretRef:
                name: voiceagent-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: voiceagent-api
  labels:
    app: voiceagent-api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    app: voiceagent-api
