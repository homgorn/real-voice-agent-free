apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voiceagent-ingress
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.voiceagent.example.com
      secretName: voiceagent-tls
  rules:
    - host: api.voiceagent.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: voiceagent-api
                port:
                  number: 80
